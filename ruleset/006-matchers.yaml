version: v1

matchers:
  - name: fc2
    category: FC2
    unrated: true
    pattern: '(?i)FC2[-_\s]?(?:PPV)?[-_\s]?([0-9]{3,})'
    normalize_template: 'FC2-PPV-$1'
    score: 100
  - name: heyzo
    unrated: true
    pattern: '(?i)HEYZO[-_\s]?([0-9]{3,6})'
    normalize_template: 'HEYZO-$1'
    score: 95
  - name: manyvids
    category: MANYVIDS
    unrated: true
    pattern: '(?i)MANYVIDS[-_\s]?([0-9]{3,})'
    normalize_template: 'MANYVIDS-$1'
    score: 92
  - name: caribpr
    unrated: true
    pattern: '(?i)CARIB(?:BEANCOMPR)?[-_\s]?([0-9]{6})[-_]([0-9]{2,3})'
    normalize_template: '$1-$2'
    score: 90
  - name: onepondo
    unrated: true
    pattern: '(?i)(?:1PONDO|1PON)[-_\s]?([0-9]{6})[_-]([0-9]{2,3})'
    normalize_template: '${1}_${2}'
    score: 90
  - name: carib_prefix
    unrated: true
    pattern: '(?i)\b(CARIB[A-Z0-9_-]{3,})\b'
    normalize_template: '$1'
    score: 89
  - name: onepon_prefix
    unrated: true
    pattern: '(?i)\b(1PON(?:DO)?[-_A-Z0-9]{3,})\b'
    normalize_template: '$1'
    score: 89
  - name: unrated_date_underscore
    unrated: true
    pattern: '(?i)\b([0-9]{4,6})_([0-9]{2,3})\b'
    normalize_template: '${1}_${2}'
    score: 88
  - name: unrated_date_hyphen
    unrated: true
    pattern: '(?i)\b([0-9]{4,6})-([0-9]{2,3})\b'
    normalize_template: '$1-$2'
    score: 88
  - name: skej_prefixed
    pattern: '(?i)\b([0-9]{3})(SKEJ)[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1$2-$3'
    score: 92
  - name: erkr_prefixed
    pattern: '(?i)\b([0-9]{3})(ERKR)[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1$2-$3'
    score: 92
  - name: httm_prefixed
    pattern: '(?i)\b([0-9]{3})(HTTM)[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1$2-$3'
    score: 92
  - name: mgs_gana
    pattern: '(?i)\b(200GANA)[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1-$2'
    score: 92
  - name: mgs_mium
    pattern: '(?i)\b(300MIUM)[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1-$2'
    score: 92
  - name: maan
    pattern: '(?i)\b(MAAN)[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1-$2'
    score: 90
  - name: hodv
    pattern: '(?i)\b(HODV)[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1-$2'
    score: 90
  - name: pfes
    pattern: '(?i)\b(PFES)[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1-$2'
    score: 90
  - name: siro
    pattern: '(?i)\b(SIRO)[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1-$2'
    score: 90
  - name: jvr
    category: JVR
    unrated: true
    pattern: '(?i)\bJVR[-_\s]?([0-9]{2,6})\b'
    normalize_template: 'JVR-$1'
    score: 85
  - name: madou
    category: MD
    unrated: true
    pattern: '(?i)\bMADOU[-_\s]?([A-Z0-9-]{2,})\b'
    normalize_template: 'MADOU-$1'
    score: 84
  - name: cospuri
    category: COSPURI
    unrated: true
    pattern: '(?i)\bCOSPURI[-_\s]?([A-Z0-9-]{4,})\b'
    normalize_template: 'COSPURI-$1'
    score: 84
  - name: unrated_misc_prefix
    unrated: true
    pattern: '(?i)\b((?:SM3D2DBD|SMDV|SKY|HEY|MKD|MKBD|H4610|H0930|MXX|DSAM)[-_A-Z0-9]{2,})\b'
    normalize_template: '$1'
    score: 83
  - name: unrated_sep_prefix
    unrated: true
    pattern: '(?i)\b((?:SMD|SSDV|CCDV|LLDV|DRC)[-_][A-Z0-9-]{2,})\b'
    normalize_template: '$1'
    score: 83
  - name: unrated_n_code
    unrated: true
    pattern: '(?i)\b(N[0-9]{2,6})\b'
    normalize_template: '$1'
    score: 82
  - name: unrated_k_code
    unrated: true
    pattern: '(?i)\b(KB?[0-9]{2,6})\b'
    normalize_template: '$1'
    score: 82
  - name: unrated_c_ki_code
    unrated: true
    pattern: '(?i)\b(C[0-9]{1,6}[-_]KI[0-9]{1,6})\b'
    normalize_template: '$1'
    score: 82
  - name: generic_censored
    pattern: '(?i)\b([A-Z]{2,10})[-_\s]?([0-9]{2,6})\b'
    normalize_template: '$1-$2'
    score: 80
